# Schema for the configuration files of the state from Workflow module.

workflow.state.*:
  type: config_entity
  label: 'Workflow State'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
    weight:
      type: integer
      label: 'Weight'
    module:
      type: string
      label: 'Module'
    wid:
      type: string
      label: 'Machine name of the attached Workflow'
    sysid:
      type: integer
      label: 'SysId'
    status:
      type: boolean
      label: 'Status'
    single_state_widget:
      type: string
      label: 'Widget behaviour when user has only 1 transition option'
